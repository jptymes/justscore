<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="theme-color" content="#000000">
<title>JustScore</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   RESET
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: 'Oswald', sans-serif;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

/* ═══════════════════════════════════════
   FORCE LANDSCAPE — portrait overlay
═══════════════════════════════════════ */
#rotate-msg {
  display: none;
  position: fixed; inset: 0;
  background: #000;
  z-index: 9999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
#rotate-msg .rotate-icon {
  font-size: 64px;
  animation: rotateHint 2s ease-in-out infinite;
}
#rotate-msg .rotate-text {
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  letter-spacing: 3px;
  color: #fff;
  text-transform: uppercase;
  text-align: center;
}
#rotate-msg .rotate-sub {
  font-size: 12px;
  letter-spacing: 2px;
  color: #555;
  text-transform: uppercase;
}
@keyframes rotateHint {
  0%,100% { transform: rotate(0deg); }
  50% { transform: rotate(90deg); }
}
@media (orientation: portrait) {
  #rotate-msg { display: flex; }
  #app { display: none; }
}

/* ═══════════════════════════════════════
   SPLASH SCREEN
═══════════════════════════════════════ */
#splash {
  position: fixed; inset: 0;
  background: #000;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  transition: opacity 0.6s ease;
}
#splash.hide {
  opacity: 0;
  pointer-events: none;
}
#splash-icon {
  width: clamp(80px, 12vw, 140px);
  height: clamp(80px, 12vw, 140px);
}
#splash-title {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(28px, 5vw, 52px);
  letter-spacing: 6px;
  color: #fff;
  text-transform: uppercase;
  font-weight: 700;
}
#splash-sub {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(11px, 1.8vw, 16px);
  letter-spacing: 3px;
  color: #00e676;
  text-transform: uppercase;
}
#splash-tag {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(9px, 1.4vw, 13px);
  letter-spacing: 2px;
  color: #555;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ═══════════════════════════════════════
   LED DOTS — always round
═══════════════════════════════════════ */
.led-dot {
  border-radius: 50%;
  background: #000;
  flex-shrink: 0;
}
.led-dot.on-red    { background:#ff2244; box-shadow:0 0 3px #ff2244,0 0 7px rgba(255,34,68,0.6); }
.led-dot.on-green  { background:#00e676; box-shadow:0 0 3px #00e676,0 0 7px rgba(0,230,118,0.55); }
.led-dot.on-yellow { background:#ffe000; box-shadow:0 0 3px #ffe000,0 0 7px rgba(255,224,0,0.55); }
.led-dot.on-amber  { background:#ffb300; box-shadow:0 0 3px #ffb300,0 0 7px rgba(255,179,0,0.55); }

.led-digit { display: grid; flex-shrink: 0; }
.led-display {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  width: 100%;
  height: 100%;
}
.led-colon {
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  flex-shrink: 0;
}
.led-colon-dot {
  border-radius: 50%;
  background: #ff2244;
  box-shadow: 0 0 3px #ff2244, 0 0 7px rgba(255,34,68,0.6);
  animation: colonBlink 1s step-start infinite;
  flex-shrink: 0;
}
.led-colon-dot.paused { animation:none; background:#000; box-shadow:none; }
@keyframes colonBlink { 50%{opacity:0.08} }

/* ═══════════════════════════════════════
   APP — scanlines
═══════════════════════════════════════ */
#app {
  width: 100vw; height: 100vh;
  background: #000;
  position: relative;
  overflow: hidden;
}
#app::after {
  content:''; position:fixed; inset:0;
  background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
  pointer-events:none; z-index:50;
}

/* ═══════════════════════════════════════
   HAMBURGER
═══════════════════════════════════════ */
#hamburger {
  position: absolute; top: 6px; left: 8px;
  z-index: 200; background: none; border: none;
  cursor: pointer; padding: 4px;
  display: flex; flex-direction: column; gap: 4px;
}
.hb-line { width:20px; height:2px; background:#fff; border-radius:2px; transition:all 0.3s; }
#hamburger.open .hb-line:nth-child(1){transform:translateY(6px) rotate(45deg);}
#hamburger.open .hb-line:nth-child(2){opacity:0;}
#hamburger.open .hb-line:nth-child(3){transform:translateY(-6px) rotate(-45deg);}

/* ═══════════════════════════════════════
   FLYOUT
═══════════════════════════════════════ */
#flyout {
  position:absolute; top:0; left:0;
  width:240px; height:100%;
  background:#080808; border-right:1px solid #1e1e1e;
  z-index:190; transform:translateX(-100%);
  transition:transform 0.3s ease;
  display:flex; flex-direction:column; padding-top:48px;
}
#flyout.open{transform:translateX(0);}
#flyout-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:180;display:none;}
#flyout-overlay.open{display:block;}
.flyout-section{padding:6px 0;border-bottom:1px solid #151515;}
.flyout-section-label{font-size:10px;letter-spacing:3px;color:#fff;font-weight:700;text-transform:uppercase;padding:6px 20px 8px;}
.flyout-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 20px;font-size:15px;letter-spacing:2px;color:#fff;
  cursor:pointer;text-transform:uppercase;transition:all 0.2s;
  border:none;background:none;width:100%;text-align:left;font-family:'Oswald',sans-serif;
}
.flyout-item:hover{background:#151515;}
.flyout-item.active{color:#ff2244;}
.flyout-item .check{color:#ff2244;font-size:13px;}
.flyout-item .ext{color:#555;font-size:11px;}
.flyout-item.link-item:hover{color:#ffb300;}
#flyout-version{padding:14px 20px;margin-top:auto;border-top:1px solid #151515;font-size:11px;letter-spacing:2px;color:#fff;text-transform:uppercase;font-family:'Oswald',sans-serif;}

/* ═══════════════════════════════════════
   MAIN GRID LAYOUT
   
   Full scoreboard as one CSS Grid:
   Rows (top half):
     - labels row (auto)
     - LED row (1fr — takes remaining space)
     - buttons row (auto)
   Divider (fixed 2px)
   Rows (bottom half):
     - labels row (auto)
     - LED row (1fr)
     - buttons row (auto)
     - bonus row (auto)
   Plus: ctrl bar (auto) + footer (auto)
═══════════════════════════════════════ */
#scoreboard {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: grid;
  grid-template-rows:
    auto      /* row 1: top labels */
    6fr       /* row 2: top LEDs — 60% of LED space */
    auto      /* row 3: top buttons */
    2px       /* row 4: divider */
    auto      /* row 5: bottom labels */
    4fr       /* row 6: bottom LEDs — 40% of LED space */
    auto      /* row 7: bottom buttons */
    auto      /* row 8: bonus row */
    auto      /* row 9: ctrl bar */
    auto;     /* row 10: footer */
  /* Col 1 has extra left padding for hamburger. Center wider for 4-digit clock */
  grid-template-columns: 1fr 1.2fr 1fr;
  padding-left: clamp(36px, 4vw, 48px); /* clear hamburger */
}

/* ── ROW 1: Labels ── */
.lbl-row-top {
  display: contents; /* children participate in parent grid */
}
.team-name {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(12px, 2.5vw, 28px);
  letter-spacing: 3px; color: #fff;
  text-transform: uppercase; cursor: pointer;
  padding: 4px 8px; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  align-self: center; justify-self: center;
  grid-row: 1;
  border-radius: 3px; transition: background 0.2s;
}
.team-name:hover{background:#111;}
.team-name:focus{outline:1px solid #ff2244;background:#0d0000;white-space:normal;}
#guestName { grid-column: 1; }
#homeName  { grid-column: 3; }

.gclock-lbl {
  grid-row: 1; grid-column: 2;
  align-self: center; justify-self: center;
}

/* ── ROW 2: Top LEDs ── */
.score-led-cell {
  grid-row: 2;
  display: flex;
  align-items: stretch;
  justify-content: center;
  min-height: 0;
  width: 100%;
  height: 100%;
  padding: 4px;
}
#guestScoreCell { grid-column: 1; }
#homeScoreCell  { grid-column: 3; }
#gclockCell     { grid-row: 2; grid-column: 2; display:flex; align-items:stretch; justify-content:center; min-height:0; width:100%; height:100%; padding:4px; }

/* ── ROW 3: Top buttons ── */
.score-btns-row {
  display: flex;
  gap: clamp(4px, 1vw, 9px);
  justify-content: center;
  flex-wrap: wrap;
  padding: 3px 6px;
  align-items: center;
}
#guestBtnsRow { grid-row: 3; grid-column: 1; }
#homeBtnsRow  { grid-row: 3; grid-column: 3; }

/* Possession + clock controls in center row 3 */
#clockBtnsRow {
  grid-row: 3; grid-column: 2;
  display: flex; flex-direction: column;
  align-items: center; gap: 3px; padding: 3px;
}
.poss-row {
  display: flex; gap: 20px; align-items: center;
}
.poss-arrow {
  font-size: clamp(12px, 2vw, 20px);
  color: #1a1a1a; cursor: pointer;
  transition: all 0.2s; line-height: 1;
}
.poss-arrow.active { color:#ffb300; text-shadow:0 0 10px rgba(255,179,0,0.9); }
.clock-ctrl-btns {
  display: flex; gap: clamp(3px, 0.7vw, 7px);
}

/* ── ROW 4: Divider ── */
#divider {
  grid-row: 4; grid-column: 1 / -1;
  background: #fff; height: 2px;
  margin: 0 8px;
}

/* ── ROW 5: Bottom labels ── */
#foulsLblGuest { grid-row: 5; grid-column: 1; align-self:center; justify-self:center; }
#foulsLblHome  { grid-row: 5; grid-column: 3; align-self:center; justify-self:center; }
#shotLbl       { grid-row: 5; grid-column: 2; align-self:center; justify-self:center; }

/* ── ROW 6: Bottom LEDs ── */
#guestFoulCell { grid-row: 6; grid-column: 1; display:flex; align-items:stretch; justify-content:center; min-height:0; width:100%; height:100%; padding:4px; }
#homeFoulCell  { grid-row: 6; grid-column: 3; display:flex; align-items:stretch; justify-content:center; min-height:0; width:100%; height:100%; padding:4px; }
#shotCell      { grid-row: 6; grid-column: 2; display:flex; align-items:stretch; justify-content:center; min-height:0; width:100%; height:100%; padding:4px; }

/* ── ROW 7: Bottom buttons ── */
#guestFoulBtns { grid-row: 7; grid-column: 1; display:flex; gap:clamp(4px,1vw,8px); justify-content:center; padding:3px; }
#homeFoulBtns  { grid-row: 7; grid-column: 3; display:flex; gap:clamp(4px,1vw,8px); justify-content:center; padding:3px; }
#shotBtns      { grid-row: 7; grid-column: 2; display:flex; gap:clamp(3px,0.7vw,7px); justify-content:center; padding:3px; }

/* ── ROW 8: Bonus ── */
#guestBonusRow { grid-row: 8; grid-column: 1; display:flex; align-items:center; justify-content:center; gap:6px; padding:2px 0 3px; }
#homeBonusRow  { grid-row: 8; grid-column: 3; display:flex; align-items:center; justify-content:center; gap:6px; padding:2px 0 3px; }
#periodRow     { grid-row: 8; grid-column: 2; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:2px 0 3px; }

/* ── ROW 9: Ctrl bar ── */
#ctrl-bar {
  grid-row: 9; grid-column: 1 / -1;
  display:flex; justify-content:center; align-items:center;
  gap:clamp(4px,0.8vw,8px); padding:3px 8px;
  flex-wrap:wrap;
}

/* ── ROW 10: Footer ── */
#footer-strip {
  grid-row: 10; grid-column: 1 / -1;
  display:flex; align-items:center; justify-content:flex-end;
  padding:2px 10px 4px; border-top:1px solid #111;
  gap: 10px;
}
#brand-name{font-size:clamp(9px,1.5vw,13px);letter-spacing:2px;color:#fff;text-transform:uppercase;font-family:'Oswald',sans-serif;font-weight:700;}
#brand-tag{font-size:clamp(7px,1.1vw,10px);letter-spacing:1.5px;color:#fff;text-transform:uppercase;opacity:0.5;font-family:'Oswald',sans-serif;}
.lbl {
  font-family:'Oswald',sans-serif;
  font-size:clamp(9px,1.6vw,15px);
  letter-spacing:3px; color:#fff;
  text-transform:uppercase; font-weight:700;
  white-space:nowrap; text-align:center;
}

.period-dots { display:flex; gap:clamp(5px,0.9vw,9px); }
.pdot {
  width:clamp(7px,1.2vw,12px); height:clamp(7px,1.2vw,12px);
  border-radius:50%; background:#000; border:1px solid #333;
  cursor:pointer; transition:all 0.25s;
}
.pdot.active{background:#ffe000;box-shadow:0 0 5px rgba(255,224,0,0.7);border-color:#ffe000;}

.bonus-light {
  width:clamp(8px,1.3vw,13px); height:clamp(8px,1.3vw,13px);
  border-radius:50%; background:#000; border:1px solid #333;
  cursor:pointer; transition:all 0.3s;
}
.bonus-light.on{background:#ffb300;box-shadow:0 0 8px rgba(255,179,0,0.8);border-color:#ffb300;}


/* ═══════════════════════════════════════
   SHARED ELEMENT STYLES
═══════════════════════════════════════ */
.btn {
  font-family:'Oswald',sans-serif;
  font-size:clamp(9px,1.5vw,13px);
  padding:clamp(3px,0.5vw,6px) clamp(6px,1.1vw,12px);
  border-radius:3px; border:1px solid #2a2a2a;
  background:#0a0a0a; color:#fff; cursor:pointer;
  transition:all 0.15s; white-space:nowrap; letter-spacing:1px;
  min-width:clamp(24px,3.5vw,38px);
}
.btn:hover{background:#1a1a1a;border-color:#444;}
.btn:active{transform:scale(0.93);}
.btn-green{color:#00e676;border-color:#003322;}
.btn-green:hover{background:#001a0d;border-color:#00e676;}
.btn-red{color:#ff2244;border-color:#2a0008;}
.btn-red:hover{background:#150005;border-color:#ff2244;}
.btn-amber{color:#ffb300;border-color:#221500;}
.btn-amber:hover{background:#110a00;border-color:#ffb300;}
.btn-blue{color:#40c4ff;border-color:#001a2a;}
.btn-blue:hover{background:#000d15;border-color:#40c4ff;}

.ctrl-btn {
  font-family:'Oswald',sans-serif;
  font-size:clamp(9px,1.3vw,12px); letter-spacing:1.5px;
  padding:clamp(4px,0.7vw,7px) clamp(7px,1.4vw,13px);
  border-radius:3px; border:1px solid #2a2a2a;
  background:#0a0a0a; color:#fff; cursor:pointer;
  text-transform:uppercase; transition:all 0.2s; white-space:nowrap;
}
.ctrl-btn:hover{background:#1a1a1a;}
.ctrl-btn:active{transform:scale(0.95);}
.ctrl-start{border-color:#003322;color:#00e676;}
.ctrl-start:hover{background:#001a0d;border-color:#00e676;}
.ctrl-stop{border-color:#2a0008;color:#ff2244;}
.ctrl-stop:hover{background:#150005;border-color:#ff2244;}
.ctrl-reset{border-color:#221500;color:#ffb300;}
.ctrl-reset:hover{background:#110a00;border-color:#ffb300;}
.ctrl-danger{border-color:#2a0008;color:#ff4444;}
.ctrl-danger:hover{background:#150005;border-color:#ff2244;}

@keyframes hornFlash{0%,100%{opacity:1}50%{opacity:0.08}}
.horn-active .led-display{animation:hornFlash 0.25s ease-in-out 8;}
</style>
</head>
<body>

<!-- ROTATE MESSAGE -->
<div id="rotate-msg">
  <div class="rotate-icon">📱</div>
  <div class="rotate-text">Rotate Your Device</div>
  <div class="rotate-sub">JustScore works best in landscape</div>
</div>

<!-- SPLASH SCREEN -->
<div id="splash">
  <img id="splash-icon" src="icon-192.png" alt="JustScore">
  <div id="splash-title">JustScore</div>
  <div id="splash-sub">by JustInTymeSports</div>
  <div id="splash-tag">Dream Big. Play Hard.</div>
</div>

<!-- MAIN APP -->
<div id="app">

  <button id="hamburger" onclick="toggleMenu()" aria-label="Menu">
    <div class="hb-line"></div><div class="hb-line"></div><div class="hb-line"></div>
  </button>

  <div id="flyout-overlay" onclick="closeMenu()"></div>
  <div id="flyout">
    <div class="flyout-section">
      <div class="flyout-section-label">Game</div>
      <button class="flyout-item" data-game="college" onclick="selectGame('college');closeMenu()">College <span class="check" id="chk-college"></span></button>
      <button class="flyout-item active" data-game="minipro" onclick="selectGame('minipro');closeMenu()">Mini-Pro <span class="check" id="chk-minipro">✓</span></button>
      <button class="flyout-item" data-game="pro" onclick="selectGame('pro');closeMenu()">Pro <span class="check" id="chk-pro"></span></button>
      <button class="flyout-item" data-game="custom" onclick="selectGame('custom');closeMenu()">Custom <span class="check" id="chk-custom"></span></button>
    </div>
    <div class="flyout-section">
      <div class="flyout-section-label">Links</div>
      <button class="flyout-item link-item" onclick="window.open('https://www.justintymesports.net','_blank');closeMenu()">Shop Our Hoops <span class="ext">↗</span></button>
      <button class="flyout-item link-item" onclick="window.open('https://www.justintymesports.net/support','_blank');closeMenu()">Help <span class="ext">↗</span></button>
    </div>
    <div id="flyout-version">JustScore v4.12</div>
  </div>

  <!-- SCOREBOARD GRID -->
  <div id="scoreboard">

    <!-- ROW 1: Labels -->
    <div class="team-name" id="guestName" contenteditable="true" spellcheck="false">GUEST</div>
    <div class="lbl gclock-lbl">Game Clock</div>
    <div class="team-name" id="homeName" contenteditable="true" spellcheck="false">HOME</div>

    <!-- ROW 2: Top LEDs -->
    <div class="score-led-cell" id="guestScoreCell">
      <div class="led-display" id="guestScoreLed"></div>
    </div>
    <div id="gclockCell">
      <div class="led-display" id="gameClockLed"></div>
    </div>
    <div class="score-led-cell" id="homeScoreCell">
      <div class="led-display" id="homeScoreLed"></div>
    </div>

    <!-- ROW 3: Top buttons + possession + clock controls -->
    <div class="score-btns-row" id="guestBtnsRow">
      <button class="btn btn-green" onclick="addScore('guest',2)">+2</button>
      <button class="btn btn-green" onclick="addScore('guest',3)">+3</button>
      <button class="btn btn-green" onclick="addScore('guest',1)">+1</button>
      <button class="btn btn-red"   onclick="addScore('guest',-1)">−</button>
    </div>
    <div id="clockBtnsRow">
      <div class="poss-row">
        <span class="poss-arrow" id="guestPoss" onclick="setPossession('guest')">◀</span>
        <span class="poss-arrow" id="homePoss"  onclick="setPossession('home')">▶</span>
      </div>
      <div class="clock-ctrl-btns">
        <button class="btn btn-green" onclick="startGameClock()" title="F5">▶</button>
        <button class="btn btn-red"   onclick="stopGameClock()"  title="F6">■</button>
        <button class="btn btn-amber" onclick="resetGameClock()" title="Ctrl+T">↺</button>
      </div>
    </div>
    <div class="score-btns-row" id="homeBtnsRow">
      <button class="btn btn-green" onclick="addScore('home',2)">+2</button>
      <button class="btn btn-green" onclick="addScore('home',3)">+3</button>
      <button class="btn btn-green" onclick="addScore('home',1)">+1</button>
      <button class="btn btn-red"   onclick="addScore('home',-1)">−</button>
    </div>

    <!-- ROW 4: Divider -->
    <div id="divider"></div>

    <!-- ROW 5: Bottom labels -->
    <div class="lbl" id="foulsLblGuest">Fouls</div>
    <div class="lbl" id="shotLbl">Shot Clock</div>
    <div class="lbl" id="foulsLblHome">Fouls</div>

    <!-- ROW 6: Bottom LEDs -->
    <div id="guestFoulCell">
      <div class="led-display" id="guestFoulsLed"></div>
    </div>
    <div id="shotCell">
      <div class="led-display" id="shotClockLed"></div>
    </div>
    <div id="homeFoulCell">
      <div class="led-display" id="homeFoulsLed"></div>
    </div>

    <!-- ROW 7: Bottom buttons -->
    <div id="guestFoulBtns">
      <button class="btn btn-green" onclick="addFoul('guest',1)">+</button>
      <button class="btn btn-red"   onclick="addFoul('guest',-1)">−</button>
    </div>
    <div id="shotBtns">
      <button class="btn btn-green" onclick="startShotClock()" title="F7">▶</button>
      <button class="btn btn-red"   onclick="stopShotClock()"  title="F8">■</button>

// ═══════════════════════════════════════
//  LED FONTS
// ═══════════════════════════════════════
const FONT7 = {
  '0':[0b11111,0b10001,0b10001,0b10001,0b10001,0b10001,0b11111],
  '1':[0b00100,0b01100,0b00100,0b00100,0b00100,0b00100,0b01110],
  '2':[0b11111,0b00001,0b00001,0b11111,0b10000,0b10000,0b11111],
  '3':[0b11111,0b00001,0b00001,0b01111,0b00001,0b00001,0b11111],
  '4':[0b10001,0b10001,0b10001,0b11111,0b00001,0b00001,0b00001],

  '6':[0b11111,0b10000,0b10000,0b11111,0b10001,0b10001,0b11111],
  '7':[0b11111,0b00001,0b00010,0b00100,0b01000,0b01000,0b01000],
  '8':[0b11111,0b10001,0b10001,0b11111,0b10001,0b10001,0b11111],
  '9':[0b11111,0b10001,0b10001,0b11111,0b00001,0b00001,0b11111],
};
const FONT5 = {
  '0':[0b111,0b101,0b101,0b101,0b111],
  '1':[0b010,0b110,0b010,0b010,0b111],
  '2':[0b111,0b001,0b111,0b100,0b111],

  '9':[0b111,0b101,0b111,0b001,0b111],
};

// ═══════════════════════════════════════
//  LOCKED RATIO CONSTANTS
//  All measurements derived from dot size d
// ═══════════════════════════════════════
const R = {
  hGap:      0.50,  // horizontal gap between dots = 50% of dotW
  vGap:      0.50,  // vertical gap between dots = 50% of dotW (round dots, equal)
  digitGapW: 0.40,  // gap between digits = 40% of digit width
};

// Font specs
const SPECS = {
  large: { cols:5, rows:7, font:'7', maxDot: 22 },  // scores, game clock, shot clock
  small: { cols:3, rows:5, font:'5', maxDot: 12 },   // fouls — capped smaller
};

// ═══════════════════════════════════════
//  DOT SIZE CALCULATOR
//  Given available W and H, returns largest
//  dot size d that fits, respecting ratios
// ═══════════════════════════════════════
function calcDot(availW, availH, spec, numDigits, hasColon) {
  const { cols, rows, maxDot } = spec;
  const digitWunits = cols + (cols - 1) * R.hGap;
  const digitGapUnits = R.digitGapW * digitWunits;
  const colonUnits = hasColon ? (1 + 2 * R.hGap) : 0;
  const totalWunits = numDigits * digitWunits
    + (numDigits - 1) * digitGapUnits
    + colonUnits;
  const totalHunits = rows + (rows - 1) * R.vGap;
  const dFromW = availW / totalWunits;
  const dFromH = availH / totalHunits;
  const d = Math.max(1, Math.min(dFromW, dFromH));
  return maxDot ? Math.min(d, maxDot) : d;
}

// ═══════════════════════════════════════
//  LED RENDERERS
// ═══════════════════════════════════════
function makeDot(d, color) {
  const el = document.createElement('div');
  el.className = 'led-dot' + (color ? ' on-' + color : '');
  el.style.width = d + 'px';
  el.style.height = d + 'px';
  return el;
}

function makeDigit(ch, d, spec, color) {
  const font = spec.font === '7' ? FONT7 : FONT5;
  const rows_data = font[ch] || font['0'];
  const { cols, rows } = spec;
  const gap = d * R.hGap;
  const el = document.createElement('div');
  el.className = 'led-digit';
  el.style.gridTemplateColumns = `repeat(${cols}, ${d}px)`;
  el.style.gridTemplateRows = `repeat(${rows}, ${d}px)`;
  el.style.columnGap = gap + 'px';
  el.style.rowGap = (d * R.vGap) + 'px';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const bit = spec.font === '7'
        ? (rows_data[r] >> (4 - c)) & 1
        : (rows_data[r] >> (2 - c)) & 1;
      el.appendChild(makeDot(d, bit ? color : null));
    }
  }
  return el;
}

function makeColon(d, paused) {
  const el = document.createElement('div');
  el.className = 'led-colon';
  const pad = d * R.hGap;
  el.style.width = (d + 2 * pad) + 'px';
  el.style.gap = (d * 2.2) + 'px';
  el.style.padding = `0 ${pad}px`;
  for (let i = 0; i < 2; i++) {
    const dot = document.createElement('div');
    dot.className = 'led-colon-dot' + (paused ? ' paused' : '');
    dot.style.width = d + 'px';
    dot.style.height = d + 'px';
    el.appendChild(dot);
  }
  return el;
}

// Measures the CELL (which has grid dimensions) not the LED container
function renderLedInCell(cell, container, str, color, spec, colonPaused) {
  if (!cell || !container) return;
  const rect = cell.getBoundingClientRect();
  const w = (rect.width  - 8) * 0.92;  // subtract padding
  const h = (rect.height - 8) * 0.88;

  if (w < 4 || h < 4) return;

  const numDigits = str.replace(':', '').length;
  const hasColon = str.includes(':');
  const d = calcDot(w, h, spec, numDigits, hasColon);
  const digitW = spec.cols * d + (spec.cols - 1) * d * R.hGap;
  const digitGap = digitW * R.digitGapW;

  container.innerHTML = '';
  container.style.gap = digitGap + 'px';
  container.style.alignItems = 'center';
  container.style.justifyContent = 'center';

  for (const ch of str) {
    if (ch === ':') container.appendChild(makeColon(d, colonPaused));
    else container.appendChild(makeDigit(ch, d, spec, color));
  }
}

function renderLed(container, str, color, spec, colonPaused) {
  renderLedInCell(container, container, str, color, spec, colonPaused);
}

// ═══════════════════════════════════════
//  DISPLAY UPDATES
// ═══════════════════════════════════════
function pad2(n){ return String(Math.max(0,n)).padStart(2,'0'); }

function updateGameClock() {
  const s = Math.max(0,S.gameSecs);
  const cell = document.getElementById('gclockCell');
  renderLedInCell(cell, document.getElementById('gameClockLed'),
    pad2(Math.floor(s/60))+':'+pad2(s%60), 'red', SPECS.large, !S.gameRunning);
}
function updateShotClock() {
  const s = Math.max(0,S.shotSecs);
  const cell = document.getElementById('shotCell');
  renderLedInCell(cell, document.getElementById('shotClockLed'),
    pad2(s), s<=5&&s>0?'amber':'red', SPECS.large, false);
}
function updateScore(team) {
  const v = team==='home'?S.homeScore:S.guestScore;
  const cellId = team==='home'?'homeScoreCell':'guestScoreCell';
  const ledId  = team==='home'?'homeScoreLed':'guestScoreLed';
  renderLedInCell(document.getElementById(cellId), document.getElementById(ledId),
    pad2(v), 'green', SPECS.large, false);
}
function updateFouls(team) {
  const v = team==='home'?S.homeFouls:S.guestFouls;
  const cellId = team==='home'?'homeFoulCell':'guestFoulCell';
  const ledId  = team==='home'?'homeFoulsLed':'guestFoulsLed';
  renderLedInCell(document.getElementById(cellId), document.getElementById(ledId),
    pad2(v), 'yellow', SPECS.small, false);
  const manual = team==='home'?S.homeBonusManual:S.guestBonusManual;
  document.getElementById(team+'Bonus').classList.toggle('on', manual||v>=S.preset.foulsBonus);
}
function updatePossession() {
  document.getElementById('homePoss').classList.toggle('active', S.possession==='home');
  document.getElementById('guestPoss').classList.toggle('active', S.possession==='guest');
}
function updatePeriodDots() {
  document.querySelectorAll('.pdot').forEach(d=>{
    const p=parseInt(d.dataset.p);
    d.style.display=p<=S.preset.periods?'':'none';
    d.classList.toggle('active',p<=S.period);
  });
}
function renderAll() {
  updateGameClock(); updateShotClock();
  updateScore('home'); updateScore('guest');
  updateFouls('home'); updateFouls('guest');
  updatePossession(); updatePeriodDots();
}

//  MENU

function toggleMenu(){
  const open=document.getElementById('flyout').classList.toggle('open');
  document.getElementById('flyout-overlay').classList.toggle('open',open);
  document.getElementById('hamburger').classList.toggle('open',open);
}
function closeMenu(){
  document.getElementById('flyout').classList.remove('open');
  document.getElementById('flyout-overlay').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
}

// ═══════════════════════════════════════
//  GAME SELECT
// ═══════════════════════════════════════
function selectGame(key) {
  stopGameClock(); stopShotClock();
  S.game=key; S.preset={...PRESETS[key]};
  S.gameSecs=S.preset.gameSecs; S.shotSecs=S.preset.shotSecs;
  S.homeScore=S.guestScore=0; S.homeFouls=S.guestFouls=0;
  S.homeBonusManual=S.guestBonusManual=false;
  S.period=1; S.possession='home';
  ['college','minipro','pro','custom'].forEach(g=>{
    const el=document.getElementById('chk-'+g); if(el) el.textContent=g===key?'✓':'';
    const btn=document.querySelector('[data-game="'+g+'"]'); if(btn) btn.classList.toggle('active',g===key);
  });
  renderAll();
}

// ═══════════════════════════════════════
//  CLOCKS
// ═══════════════════════════════════════
function startGameClock(){
  if(S.gameRunning||S.gameSecs<=0)return;
  S.gameRunning=true; updateGameClock();
  gameTimer=setInterval(()=>{
    if(S.gameSecs>0){S.gameSecs--;updateGameClock();}
    else{stopGameClock();horn();}
  },1000);
}
function stopGameClock(){S.gameRunning=false;clearInterval(gameTimer);updateGameClock();}
function resetGameClock(){stopGameClock();S.gameSecs=S.preset.gameSecs;updateGameClock();}
function toggleGameClock(){S.gameRunning?stopGameClock():startGameClock();}
function startShotClock(){
  if(S.shotRunning||S.shotSecs<=0)return; S.shotRunning=true;
  shotTimer=setInterval(()=>{
    if(S.shotSecs>0){S.shotSecs--;updateShotClock();}
    else{stopShotClock();playSound('buzzer');}
  },1000);
}
function stopShotClock(){S.shotRunning=false;clearInterval(shotTimer);}
function resetShotClock(){stopShotClock();S.shotSecs=S.preset.shotSecs;updateShotClock();}
function resetStartShotClock(){resetShotClock();startShotClock();}
function toggleShotClock(){S.shotRunning?stopShotClock():startShotClock();}
function horn(){
  playSound('buzzer');
  document.getElementById('app').classList.add('horn-active');
  setTimeout(()=>document.getElementById('app').classList.remove('horn-active'),2500);
}

// ═══════════════════════════════════════
//  SCORING / FOULS / POSSESSION / PERIOD
// ═══════════════════════════════════════
function addScore(team,pts){
  if(team==='home')S.homeScore=Math.max(0,S.homeScore+pts);
  else S.guestScore=Math.max(0,S.guestScore+pts);
  updateScore(team);
}
function setPossession(team){S.possession=team;updatePossession();}
function addFoul(team,n){
  if(team==='home')S.homeFouls=Math.max(0,Math.min(9,S.homeFouls+n));
  else S.guestFouls=Math.max(0,Math.min(9,S.guestFouls+n));
  updateFouls(team);
}
function toggleBonus(team){
  if(team==='home')S.homeBonusManual=!S.homeBonusManual;
  else S.guestBonusManual=!S.guestBonusManual;
  updateFouls(team);
}
function setPeriod(p){S.period=p;updatePeriodDots();}
function nextPeriod(){
  if(S.period<S.preset.periods){
    S.period++;
    S.homeFouls=S.guestFouls=0; S.homeBonusManual=S.guestBonusManual=false;
    updateFouls('home'); updateFouls('guest');
    resetGameClock(); resetShotClock(); updatePeriodDots();
  }
}
function fullReset(){
  stopGameClock(); stopShotClock();
  S.homeScore=S.guestScore=0; S.homeFouls=S.guestFouls=0;
  S.homeBonusManual=S.guestBonusManual=false;
  S.gameSecs=S.preset.gameSecs; S.shotSecs=S.preset.shotSecs;
  S.possession='home'; S.period=1; renderAll();
}

// ═══════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(document.activeElement?.contentEditable==='true')return;
  switch(e.key){
    case 'F5':e.preventDefault();startGameClock();break;
    case 'F6':e.preventDefault();stopGameClock();break;
    case 'F7':e.preventDefault();startShotClock();break;
    case 'F8':e.preventDefault();stopShotClock();break;
    case 'F9':e.preventDefault();resetStartShotClock();break;
    case 'g':case 'G':toggleGameClock();break;
    case 'h':case 'H':toggleShotClock();break;
    case 'b':case 'B':startGameClock();startShotClock();break;
    case 'n':case 'N':resetStartShotClock();break;
    case 't':if(e.ctrlKey){e.preventDefault();resetGameClock();}break;
    case 'y':if(e.ctrlKey){e.preventDefault();resetShotClock();}break;
    case 'j':case 'J':addScore('home',2);break;
    case 'k':case 'K':addScore('home',3);break;
    case 'l':case 'L':addScore('home',1);break;
    case ';':addScore('home',-1);break;
    case 'f':case 'F':if(!e.ctrlKey)addScore('guest',2);break;
    case 'd':case 'D':addScore('guest',3);break;
    case 's':case 'S':if(!e.ctrlKey)addScore('guest',1);break;
    case 'a':case 'A':addScore('guest',-1);break;
  }
});

// ═══════════════════════════════════════
//  RESIZE — re-render on screen change
// ═══════════════════════════════════════
window.addEventListener('resize',()=>{
  clearTimeout(window._rt);
  window._rt=setTimeout(renderAll,150);
});

// ═══════════════════════════════════════
//  SERVICE WORKER
// ═══════════════════════════════════════
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

// ═══════════════════════════════════════
//  INIT — ResizeObserver fires when each
//  LED cell gets real grid dimensions
// ═══════════════════════════════════════
initAudio();
selectGame('minipro');

const LED_CELLS = [
  'guestScoreCell', 'homeScoreCell', 'gclockCell',
  'guestFoulCell',  'homeFoulCell',  'shotCell'
];

// Track which cells have been sized
const _rendered = new Set();

function tryRenderCell(id) {
  const cell = document.getElementById(id);
  if (!cell) return;
  const r = cell.getBoundingClientRect();
  if (r.width > 4 && r.height > 4) {
    if (!_rendered.has(id)) {
      _rendered.add(id);
      renderAll(); // re-render everything once first real cell appears
    }
  }
}

// Use ResizeObserver — fires as soon as grid assigns real dimensions
if (window.ResizeObserver) {
  const ro = new ResizeObserver(() => {
    LED_CELLS.forEach(tryRenderCell);
    // Once all cells rendered, disconnect
    if (_rendered.size >= LED_CELLS.length) ro.disconnect();
  });
  LED_CELLS.forEach(id => {
    const el = document.getElementById(id);
    if (el) ro.observe(el);
  });
} else {
  // Fallback for browsers without ResizeObserver
  let attempts = 0;
  const poll = setInterval(() => {
    if (++attempts > 60) { clearInterval(poll); return; }
    const cell = document.getElementById('guestScoreCell');
    if (cell && cell.getBoundingClientRect().width > 4) {
      clearInterval(poll);
      renderAll();
    }
  }, 50);
}

// Splash screen
window.addEventListener('load', () => {
  setTimeout(() => {
    const splash = document.getElementById('splash');
    splash.classList.add('hide');
    setTimeout(() => splash.style.display = 'none', 650);
  }, 2000);
});
</script>
</body>
